<!-- Toast -->

<script>
/* =========================================================
   DATOS DE DEMOSTRACIÓN (tus datos actuales del Excel)
   Se usan si no configuras SPREADSHEET_ID.
   ========================================================= */
const DATOS_DEMO = [
  { nombre:"AGUILAR CASTRO BYRON STIVEN", curso:"QUINTO A", obs:"PAGARÁ Y ASISTIRÁ", pagado:false },
  { nombre:"WALTER XAVIER MONCAYO HEREDERO", curso:"QUINTO A", obs:"PAGARÁ Y ASISTIRÁ", pagado:true },
  { nombre:"AREVALO ESPIN CARLOS MANUEL", curso:"QUINTO A", obs:"PAGARÁ Y ASISTIRÁ", pagado:false },
  { nombre:"MOREIRA SANTANA CARLOS ANTONIO", curso:"QUINTO A", obs:"PAGARÁ Y ASISTIRÁ", pagado:false },
  { nombre:"MOREIRA SALAZAR EDUARDO HUMBERTO", curso:"QUINTO A", obs:"PAGARÁ Y ASISTIRÁ", pagado:false },
  { nombre:"MERA SALAS JORGE ISAAC", curso:"QUINTO A", obs:"PAGARÁ", pagado:true },
  { nombre:"ACUÑA VALVERDE ALISON SOLANGE", curso:"QUINTO A", obs:"PAGARÁ Y ASISTIRÁ", pagado:true },
  { nombre:"STEFANY MONTENEGRO", curso:"QUINTO A", obs:"PAGARÁ Y ASISTIRÁ", pagado:false },
  { nombre:"CARLOS MUÑOZ", curso:"QUINTO A", obs:"PAGARÁ Y ASISTIRÁ", pagado:false },
  { nombre:"LUIS AVILEZ", curso:"QUINTO A", obs:"PAGARÁ Y ASISTIRÁ", pagado:true },
  { nombre:"NAYA NICOLE ONOFRE ROCAFUERTE", curso:"QUINTO A", obs:"PAGARÁ Y ASISTIRÁ", pagado:false },
  { nombre:"WILLIAM BRYAM FRANCO VALENCIA", curso:"QUINTO A", obs:"PAGARÁ Y ASISTIRÁ", pagado:false },
  { nombre:"MILTON ALEJANDRO GAVILANEZ MONTEROS", curso:"QUINTO A", obs:"PAGARÁ Y ASISTIRÁ", pagado:false },
  { nombre:"CHIMBORAZO ESCOBAR DAYAN ESTUARDO", curso:"QUINTO A", obs:"PAGARÁ Y ASISTIRÁ", pagado:true },
  { nombre:"GUILCAPI VASQUEZ LUIS ROBERTO", curso:"QUINTO A", obs:"PAGARÁ Y ASISTIRÁ", pagado:false },
  { nombre:"UMANANTE TORRES JEREMY ALEXANDER", curso:"QUINTO A", obs:"PAGARÁ Y ASISTIRÁ", pagado:true },
];

/* =========================================================
   ESTADO
   ========================================================= */
let ALUMNOS = [];
let filtroActual = "todos";
let usandoDemo = false;
let timerRefresco = null;

const $ = (id) => document.getElementById(id);

/* =========================================================
   CARGA DESDE GOOGLE SHEETS (endpoint gviz, sin API key)
   ========================================================= */
function urlGviz() {
  const id = CONFIG.SPREADSHEET_ID.trim();
  const hoja = CONFIG.SHEET_NAME.trim();
  const base = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json`;
  return hoja ? base + "&sheet=" + encodeURIComponent(hoja) : base;
}

// Localiza una columna por su encabezado (sin importar mayúsculas/acentos)
function normalizar(s) {
  return (s || "").toString().normalize("NFD").replace(/[̀-ͯ]/g, "").toUpperCase().trim();
}

function parseGviz(texto) {
  // La respuesta viene envuelta: google.visualization.Query.setResponse({...});
  const inicio = texto.indexOf("{");
  const fin = texto.lastIndexOf("}");
  const json = JSON.parse(texto.substring(inicio, fin + 1));
  const cols = json.table.cols.map(c => normalizar(c.label));
  const rows = json.table.rows || [];

  // Detecta índices por encabezado (con respaldos por posición del Excel)
  const idxNombre = cols.findIndex(c => c.includes("APELLIDOS") || c.includes("NOMBRE"));
  const idxCurso  = cols.findIndex(c => c.includes("CURSO"));
  const idxObs    = cols.findIndex(c => c.includes("OBSERVAC"));
  const idxPago   = cols.findIndex(c => c === "PAGO" || c.includes("PAGO"));

  const cNombre = idxNombre >= 0 ? idxNombre : 1;
  const cCurso  = idxCurso  >= 0 ? idxCurso  : 2;
  const cObs    = idxObs    >= 0 ? idxObs    : 4;
  const cPago   = idxPago   >= 0 ? idxPago   : 5;

  const val = (fila, i) => (fila.c[i] && fila.c[i].v != null) ? fila.c[i].v : "";

  return rows
    .map((r, i) => {
      const nombre = (val(r, cNombre) || "").toString().trim();
      const pagoTxt = normalizar(val(r, cPago));
      return {
        // fila real en la hoja: la fila 1 es el encabezado, por eso i + 2
        fila: i + 2,
        nombre,
        curso: (val(r, cCurso) || "").toString().trim(),
        obs: (val(r, cObs) || "").toString().trim(),
        pagado: pagoTxt.includes("PAGADO") && !pagoTxt.includes("PENDIENTE")
      };
    })
    .filter(a => a.nombre); // ignora filas vacías
}

async function cargarDatos() {
  const icono = $("iconoRefrescar");
  icono.classList.add("animate-spin");

  if (!CONFIG.SPREADSHEET_ID.trim()) {
    usandoDemo = true;
    ALUMNOS = DATOS_DEMO.slice();
    render();
    mostrarAviso("info", "Mostrando datos de demostración. Pega el ID de tu Google Sheet en la configuración del archivo para ver los datos en vivo.");
    icono.classList.remove("animate-spin");
    return;
  }

  try {
    const resp = await fetch(urlGviz(), { cache: "no-store" });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const texto = await resp.text();
    ALUMNOS = parseGviz(texto);
    usandoDemo = false;
    ocultarAviso();
    render();
  } catch (e) {
    console.error(e);
    if (ALUMNOS.length === 0) {
      usandoDemo = true;
      ALUMNOS = DATOS_DEMO.slice();
      render();
    }
    mostrarAviso("error", "No se pudo conectar con el Google Sheet. Verifica que esté compartido como «Cualquiera con el enlace: Lector» y que el ID y el nombre de la pestaña sean correctos.");
  } finally {
    icono.classList.remove("animate-spin");
  }
}

/* =========================================================
   RENDER
   ========================================================= */
function calcular(lista = ALUMNOS) {
  const total = lista.length;
  const pagados = lista.filter(a => a.pagado).length;
  const pendientes = total - pagados;
  const recaudado = pagados * CONFIG.PRECIO_POR_PERSONA;
  return { total, pagados, pendientes, recaudado };
}

// Lista según el filtro activo (Todos/Pagados/Pendientes) + búsqueda
function obtenerFiltrados() {
  const q = normalizar($("buscador").value);
  return ALUMNOS.filter(a => {
    if (filtroActual === "pagado" && !a.pagado) return false;
    if (filtroActual === "pendiente" && a.pagado) return false;
    if (q && !normalizar(a.nombre).includes(q)) return false;
    return true;
  });
}

const ETIQUETA_FILTRO = { todos: "Todos", pagado: "Pagados", pendiente: "Pendientes" };

function render() {
  const { total, pagados, pendientes, recaudado } = calcular();
  $("statTotal").textContent = total;
  $("statPagados").textContent = pagados;
  $("statPendientes").textContent = pendientes;
  $("statRecaudado").textContent = "$" + recaudado;
  $("subtitulo").textContent = CONFIG.EVENTO +
    (usandoDemo ? " · demo" : (puedeEditar() ? " · en vivo · editable" : " · en vivo"));
  $("fuenteDato").textContent = usandoDemo
    ? "Datos de demostración"
    : "Conectado a Google Sheets · " + CONFIG.SHEET_NAME;

  const lista = obtenerFiltrados();

  const cont = $("lista");
  if (lista.length === 0) {
    cont.innerHTML = `<div class="text-center text-slate-400 py-10 text-sm">Sin resultados</div>`;
    return;
  }

  const editable = puedeEditar();

  cont.innerHTML = lista.map(a => {
    const color = a.pagado ? "bg-emerald-100 text-emerald-700" : "bg-amber-100 text-amber-700";
    const texto = a.pagado ? "✅ Pagado" : "⏳ Pendiente";
    const badge = editable && a.fila
      ? `<button data-fila="${a.fila}" class="badge-toggle shrink-0 inline-flex items-center gap-1 ${color} text-xs font-semibold px-2.5 py-1 rounded-full active:scale-95 transition ring-1 ring-inset ring-black/5" title="Tocar para cambiar">${texto} ✎</button>`
      : `<span class="shrink-0 inline-flex items-center gap-1 ${color} text-xs font-semibold px-2.5 py-1 rounded-full">${texto}</span>`;
    return `
      <div class="bg-white rounded-2xl shadow-sm p-3.5 flex items-center justify-between gap-3">
        <div class="min-w-0">
          <p class="font-semibold text-sm leading-tight break-words">${escape(a.nombre)}</p>
          <p class="text-xs text-slate-400 mt-0.5">${escape(a.curso)}${a.obs ? " · " + escape(a.obs) : ""}</p>
        </div>
        ${badge}
      </div>`;
  }).join("");
}

function escape(s) {
  return (s || "").toString().replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
}

/* =========================================================
   EDICIÓN: escribir el estado de vuelta al Google Sheet
   (vía Apps Script Web App; ver apps-script.gs)
   ========================================================= */
let escriturasPendientes = 0;

function puedeEditar() {
  return !!CONFIG.APPS_SCRIPT_URL.trim() && !usandoDemo;
}

async function cambiarEstado(fila, botonEl) {
  const alumno = ALUMNOS.find(a => a.fila === fila);
  if (!alumno) return;

  const nuevoPagado = !alumno.pagado;
  alumno.pagado = nuevoPagado;   // actualización optimista
  escriturasPendientes++;
  if (botonEl) { botonEl.disabled = true; botonEl.textContent = "Guardando…"; }
  render();

  try {
    // Apps Script no envía cabeceras CORS: usamos no-cors + text/plain (sin preflight).
    // No podemos leer la respuesta, así que confirmamos recargando después.
    await fetch(CONFIG.APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ token: CONFIG.TOKEN, fila: fila, pagado: nuevoPagado })
    });
    toast(nuevoPagado ? "✅ Marcado como Pagado" : "⏳ Marcado como Pendiente");
    // Deja que Google procese el cambio y luego sincroniza con la hoja real.
    setTimeout(() => { escriturasPendientes--; cargarDatos(); }, 1500);
  } catch (e) {
    console.error(e);
    alumno.pagado = !nuevoPagado; // revertir
    escriturasPendientes--;
    toast("No se pudo guardar. Revisa tu conexión.");
    render();
  }
}

/* =========================================================
   AVISOS / TOAST
   ========================================================= */
function mostrarAviso(tipo, msg) {
  const el = $("aviso");
  const estilos = {
    error: "bg-red-50 text-red-700 border border-red-200",
    info: "bg-sky-50 text-sky-700 border border-sky-200"
  };
  el.className = "rounded-2xl px-4 py-3 text-sm " + (estilos[tipo] || estilos.info);
  el.textContent = msg;
  el.classList.remove("hidden");
}
function ocultarAviso() { $("aviso").classList.add("hidden"); }

let toastTimer;
function toast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.remove("hidden");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.add("hidden"), 2600);
}

/* =========================================================
   REPORTE -> IMAGEN
   ========================================================= */
function prepararReporte() {
  const lista = obtenerFiltrados();
  const { total, pagados, pendientes, recaudado } = calcular(lista);
  const etq = ETIQUETA_FILTRO[filtroActual] || "Todos";

  $("repTitulo").textContent = CONFIG.EVENTO;
  $("repFecha").textContent =
    "Filtro: " + etq + " · " + new Date().toLocaleString("es-EC", { dateStyle: "long", timeStyle: "short" });

  // Muestra sólo los cuadros relevantes según el filtro
  $("cajaPagados").style.display   = (filtroActual === "pendiente") ? "none" : "";
  $("cajaPendientes").style.display = (filtroActual === "pagado")    ? "none" : "";
  $("cajaRecaudado").style.display  = (filtroActual === "pendiente") ? "none" : "";

  $("repTotal").textContent = total;
  $("repTotalLabel").textContent = (filtroActual === "todos") ? "Total" : etq;
  $("repPagados").textContent = pagados;
  $("repPendientes").textContent = pendientes;
  $("repRecaudado").textContent = "$" + recaudado;

  $("repLista").innerHTML = lista.map(a => `
    <div class="flex items-center justify-between text-xs py-1.5 border-b border-slate-100">
      <span class="text-slate-700 pr-2 truncate">${escape(a.nombre)}</span>
      <span class="shrink-0 font-semibold ${a.pagado ? "text-emerald-600" : "text-amber-500"}">
        ${a.pagado ? "✅ Pagado" : "⏳ Pendiente"}
      </span>
    </div>`).join("");
}

async function generarCanvas() {
  const nodo = $("reporteCanvasArea");
  return await html2canvas(nodo, {
    scale: Math.min(3, (window.devicePixelRatio || 1) + 1),
    backgroundColor: "#ffffff",
    useCORS: true,
    logging: false
  });
}

function canvasABlob(canvas) {
  return new Promise((resolve) => {
    if (canvas.toBlob) canvas.toBlob(b => resolve(b), "image/png");
    else {
      // Respaldo para navegadores sin toBlob
      const dataUrl = canvas.toDataURL("image/png");
      const bin = atob(dataUrl.split(",")[1]);
      const arr = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
      resolve(new Blob([arr], { type: "image/png" }));
    }
  });
}

let ultimoCanvas = null;

async function descargarImagen() {
  try {
    const canvas = ultimoCanvas || (ultimoCanvas = await generarCanvas());
    const blob = await canvasABlob(canvas);
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "reporte-pagos-" + new Date().toISOString().slice(0, 10) + ".png";
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 4000);
    toast("Imagen descargada");
  } catch (e) {
    console.error(e);
    toast("No se pudo generar la imagen");
  }
}

/* ---- COPIA ROBUSTA con múltiples respaldos ---- */
async function copiarImagen() {
  const txt = $("txtCopiar");
  const original = txt.textContent;
  txt.textContent = "Copiando…";
  try {
    const canvas = ultimoCanvas || (ultimoCanvas = await generarCanvas());
    const blob = await canvasABlob(canvas);

    // Método 1: Async Clipboard API (Chrome/Edge/Android modernos, requiere contexto seguro)
    if (navigator.clipboard && window.ClipboardItem) {
      try {
        await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
        toast("✅ Imagen copiada al portapapeles");
        return;
      } catch (e1) {
        console.warn("Clipboard API falló, probando respaldo:", e1);
      }
    }

    // Método 2: ClipboardItem con promesa (Safari)
    if (navigator.clipboard && window.ClipboardItem) {
      try {
        await navigator.clipboard.write([
          new ClipboardItem({ "image/png": Promise.resolve(blob) })
        ]);
        toast("✅ Imagen copiada al portapapeles");
        return;
      } catch (e2) {
        console.warn("Respaldo Safari falló:", e2);
      }
    }

    // Método 3: execCommand sobre imagen editable (navegadores antiguos / file://)
    const ok = await copiarConExecCommand(canvas);
    if (ok) { toast("✅ Imagen copiada"); return; }

    // Método 4: no se pudo copiar -> descarga automática como salida garantizada
    toast("Tu navegador no permite copiar imágenes aquí. Descargando…");
    await descargarImagen();
  } catch (e) {
    console.error(e);
    toast("No se pudo copiar. Usa «Descargar».");
  } finally {
    txt.textContent = original;
  }
}

function copiarConExecCommand(canvas) {
  return new Promise((resolve) => {
    try {
      const div = document.createElement("div");
      div.contentEditable = "true";
      div.style.position = "fixed";
      div.style.left = "-99999px";
      div.style.opacity = "0";
      const img = document.createElement("img");
      img.src = canvas.toDataURL("image/png");
      div.appendChild(img);
      document.body.appendChild(div);

      const rango = document.createRange();
      rango.selectNode(div);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(rango);

      let exito = false;
      try { exito = document.execCommand("copy"); } catch (_) { exito = false; }

      sel.removeAllRanges();
      div.remove();
      resolve(exito);
    } catch (e) {
      resolve(false);
    }
  });
}

/* =========================================================
   EVENTOS
   ========================================================= */
$("buscador").addEventListener("input", render);

// Tocar la insignia de estado para cambiar Pagado <-> Pendiente
$("lista").addEventListener("click", (e) => {
  const btn = e.target.closest(".badge-toggle");
  if (!btn || btn.disabled) return;
  cambiarEstado(Number(btn.dataset.fila), btn);
});

document.querySelectorAll(".filtro-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    filtroActual = btn.dataset.filtro;
    document.querySelectorAll(".filtro-btn").forEach(b => {
      b.className = "filtro-btn px-3 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap bg-slate-100 text-slate-600";
    });
    btn.className = "filtro-btn px-3 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap bg-emerald-600 text-white";
    render();
  });
});

$("btnRefrescar").addEventListener("click", cargarDatos);

$("btnReporte").addEventListener("click", () => {
  ultimoCanvas = null;           // fuerza regenerar con datos frescos
  prepararReporte();
  $("modal").classList.remove("hidden");
});
$("cerrarModal").addEventListener("click", () => $("modal").classList.add("hidden"));
$("modal").addEventListener("click", (e) => { if (e.target === $("modal")) $("modal").classList.add("hidden"); });

$("btnCopiar").addEventListener("click", copiarImagen);
$("btnDescargar").addEventListener("click", descargarImagen);

/* =========================================================
   INICIO
   ========================================================= */
cargarDatos();
if (CONFIG.AUTO_REFRESH_SEG > 0) {
  timerRefresco = setInterval(() => {
    // No refrescar con el reporte abierto ni con cambios en curso (evita revertir la UI)
    if ($("modal").classList.contains("hidden") && escriturasPendientes === 0) cargarDatos();
  }, CONFIG.AUTO_REFRESH_SEG * 1000);
}
</script>
